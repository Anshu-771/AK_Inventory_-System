<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Record</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .radio-group {
            margin: 20px 0;
            text-align: left;
        }
        input[type="radio"] {
            margin-right: 10px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #0055aa;
        }
        #result {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            min-height: 100px;
            background: #fafafa;
        }
        .error {
            color: red;
            font-weight: bold;
        }
        .success {
            color: green;
            font-weight: bold;
        }
        table {
        border-collapse: collapse; /* Collapses borders into a single line */
        width: 100%;
        }
        th, td {
            border: 1px solid #000000; /* Adds a border to cells */
            padding: 1px; /* Adds space inside cells */
            text-align: center; /* Aligns text to the left */
            border-radius: 20px;
        }
        .td1 {
            border: 1px solid #ffffff; /* Adds a border to cells */
            padding: 1px; /* Adds space inside cells */
            text-align: center; /* Aligns text to the left */
            border-radius: 20px;
            background-color: aqua;
        }
        th {
            background-color: #f2f2f2; /* Gray background for headers */
        }
    </style>
</head>
<body>

<div class="container">

    <table>

            <tr>
                <td class="td1"><a href="{{ url_for('search') }}"><button type="button" class="buttonSearch">search</button></a></td>
                <td class="td1"><a href="{{ url_for('item') }}"><button type="button" class="buttonSearch">Add</button></a></td>
                <td class="td1"><a href="{{ url_for('edit') }}"><button type="button" class="buttonSearch">Edit</button></a></td>
                <td class="td1"><a href="{{ url_for('stock') }}"><button type="button" class="buttonSearch">Stock</button></a></td>
            </tr>
    </table>
    <h1>BILLING</h1>

    <h4>Provide item details_______________________________________________</h4>
    <form id="searchForm"action="{{ url_for('search') }}" method="POST">
    <div class="radio-group">
        <label><input type="radio" name="type" value="id" checked> By ID</label>
        <label><input type="radio" name="type" value="name"> By Name</label>
        <input type="text" name="name" id="searchValue" placeholder="Enter ID or Name here..." />
        <label for="quantity">Quantity / Stock *</label>
        <input  type="number" id="quantity" min="1" value="1" required name="item_quantity">
        <button type="button" style="width: 20%; background-color: rgb(175, 244, 105);color: #000000;height: 10%;">ADD</button>
    </div>
    <br>
    <br>
    <hr>
     <table>
            <tr>
                <th style="border-radius: 0;"><p>S.No</p></td>
                <th style="border-radius: 0;"><p>NAME</p></td>
                <th style="border-radius: 0;"><p>PRICE</p></td>
                <th style="border-radius: 0;"><p>QUANTITY</p></td>
                <th style="border-radius: 0;"><p>TOTAL</p></td>
                <th style="border-radius: 0;"><p>Delete</p></td>
            </tr>
            {% i = 1 %}
            {% for item in n %}
            <tr>
                <td><p>{{i=i+1}}</p></td>
                <td><p>{{item.name}}</p></td>
                <td><p>{{item.price}}</p></td>
                <td><p>{{item.quantity}}</p></td>
                <td><p>{{item.price*item.quantity}}</p></td>
                <td><button type="button" style="background-color: rgb(240, 69, 69);color: #000000;height: 10%;">Delete</button></td>
            </tr> 
            {% endfor %}
            {% endif %}
    </table>
    <br>
    <br>
    <label for="username">Name of Costomer :</label>
    <input type="text" name="uname" id="username" placeholder="Enter Nume" />
    <label for="mobileNumber">Phone No. :</label>
    <input type="text" name="unumber" id="mobileNumber" placeholder="Enter Mobile Number" />
    
</div>
    <script>

    </script>


</body>
</html>
