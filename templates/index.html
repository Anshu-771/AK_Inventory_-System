<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Inventory - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #fae8ff 100%);
            margin: 0;
            padding: 32px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dashboard {
            max-width: 900px;
            width: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(4px);
            border-radius: 56px;
            padding: 48px 40px;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.6);
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, #4f46e5, #ec489a);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        .sub {
            color: #475569;
            margin-bottom: 48px;
            font-size: 1.1rem;
        }
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .action-card {
            background: white;
            border-radius: 28px;
            padding: 8px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 14px rgba(0,0,0,0.05);
            border: 1px solid #f1f5f9;
        }
        .action-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(79, 70, 229, 0.2);
            border-color: #c7d2fe;
        }
        .dashboard-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 12px;
            background: transparent;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            font-family: inherit;
        }
        .dashboard-btn span { font-size: 1.6rem; }
        .btn-search { color: #3b82f6; } .btn-search:hover { background: #eff6ff; }
        .btn-bill { color: #10b981; } .btn-bill:hover { background: #ecfdf5; }
        .btn-add { color: #f59e0b; } .btn-add:hover { background: #fffbeb; }
        .btn-stock { color: #8b5cf6; } .btn-stock:hover { background: #f5f3ff; }
        .btn-edit { color: #ef4444; } .btn-edit:hover { background: #fef2f2; }
        @media (max-width: 600px) {
            .dashboard { padding: 32px 24px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <h1>⚡ AK INVENTORY SYSTEM</h1>
    <div class="sub">Manage items, track stock, and generate bills seamlessly</div>
    <div class="button-grid">
        <div class="action-card"><a href="{{ url_for('search') }}" class="dashboard-btn btn-search"><span>🔍</span> Search Item</a></div>
        <div class="action-card"><a href="{{ url_for('bill') }}" class="dashboard-btn btn-bill"><span>🧾</span> Billing</a></div>
        <div class="action-card"><a href="{{ url_for('item') }}" class="dashboard-btn btn-add"><span>➕</span> Add Item</a></div>
        <div class="action-card"><a href="{{ url_for('stock') }}" class="dashboard-btn btn-stock"><span>📦</span> Stock</a></div>
        <div class="action-card"><a href="{{ url_for('edit') }}" class="dashboard-btn btn-edit"><span>✏️</span> Edit Item</a></div>
    </div>
</div>
</body>
</html>
