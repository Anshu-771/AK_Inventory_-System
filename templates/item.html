<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Inventory - Add New Item</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            margin: 0;
            padding: 24px;
            min-height: 100vh;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h1 {
            text-align: center;
            color: #1e293b;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 28px;
            background: linear-gradient(135deg, #b45309, #f59e0b);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Navigation */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 36px;
        }

        .nav-card {
            background: white;
            border-radius: 20px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .nav-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -8px rgba(245, 158, 11, 0.2);
            border-color: #fcd34d;
        }

        .nav-button {
            display: block;
            width: 100%;
            padding: 12px 16px;
            background: transparent;
            color: #334155;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            text-align: center;
            border-radius: 18px;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .nav-card:nth-child(1) .nav-button { color: #3b82f6; }
        .nav-card:nth-child(2) .nav-button { color: #10b981; }
        .nav-card:nth-child(3) .nav-button { color: #ef4444; }
        .nav-card:nth-child(4) .nav-button { color: #8b5cf6; }

        /* Form Styles */
        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        label .required {
            color: #ef4444;
            margin-left: 4px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 24px;
            transition: all 0.2s;
            background: white;
            font-family: inherit;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover {
            transform: scale(1.01);
            box-shadow: 0 15px 25px -10px #f59e0b;
        }

        /* Form Sections */
        .form-section {
            background: #f8fafc;
            border-radius: 28px;
            padding: 8px 4px;
        }

        hr {
            margin: 20px 0;
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
        }

        @media (max-width: 640px) {
            body { padding: 16px; }
            .container { padding: 24px; }
            .nav-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Navigation -->
    <div class="nav-grid">
        <div class="nav-card"><a href="{{ url_for('search') }}" class="nav-button">🔍 Search</a></div>
        <div class="nav-card"><a href="{{ url_for('bill') }}" class="nav-button">🧾 Bill</a></div>
        <div class="nav-card"><a href="{{ url_for('edit') }}" class="nav-button">✏️ Edit</a></div>
        <div class="nav-card"><a href="{{ url_for('stock') }}" class="nav-button">📦 Stock</a></div>
    </div>

    <h1>✨ ADD NEW ITEM</h1>

    <form id="itemForm" method="post" action="{{ url_for('item') }}">
        <div class="form-group">
            <label>Item Name <span class="required">*</span></label>
            <input type="text" id="name" placeholder="e.g. Wireless Mechanical Keyboard" required name="item_name">
        </div>

        <div class="form-group">
            <label>Category</label>
            <select id="category" name="item_category">
                <option value="">Select category</option>
                <option value="Electronics">📱 Electronics</option>
                <option value="Stationery">✏️ Stationery</option>
                <option value="Furniture">🪑 Furniture</option>
                <option value="Groceries">🥬 Groceries</option>
                <option value="Clothing">👕 Clothing</option>
                <option value="Other">📦 Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Price (₹) <span class="required">*</span></label>
            <input type="number" id="price" step="0.01" min="0" placeholder="e.g. 1299.00" required name="item_price">
        </div>

        <div class="form-group">
            <label>Quantity / Stock <span class="required">*</span></label>
            <input type="number" id="quantity" min="0" placeholder="e.g. 50" required name="item_quantity">
        </div>

        <div class="form-group">
            <label>Status</label>
            <select id="status" name="item_status">
                <option value="Active">🟢 Active</option>
                <option value="Inactive">🟡 Inactive</option>
                <option value="Discontinued">🔴 Discontinued</option>
            </select>
        </div>

        <button type="submit" class="submit-btn">
            ➕ Add Item to Inventory
        </button>
    </form>

    {% if submitted %}
    <script>
        alert("✅ Item has been added successfully!");
    </script>
    {% endif %}
</div>

</body>
</html>
